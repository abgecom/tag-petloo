name: Protect Critical Config Files

on:
  pull_request:
    branches:
      - main
    paths:
      - 'next.config.mjs'
      - 'vercel.json'

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    name: Block changes to next.config.mjs and vercel.json

    steps:
      - name: Check for changes in protected files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const protected_files = ['next.config.mjs', 'vercel.json'];
            const changed = files.map(f => f.filename).filter(f => protected_files.includes(f));

            if (changed.length > 0) {
              core.setFailed(
                'BLOCKED: This PR modifies protected files: ' + changed.join(', ') + '\n\n' +
                'Esses arquivos foram corrigidos manualmente e nao devem ser alterados pelo v0 ou bots.\n' +
                'Se precisar alterar, faca diretamente no branch main com revisao manual.'
              );
            } else {
              console.log('OK: No protected files modified. Safe to merge.');
            }
